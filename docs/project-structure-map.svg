<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #475569; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 20; }
      .frontend { fill: #dbeafe; stroke: #60a5fa; }
      .backend { fill: #dcfce7; stroke: #4ade80; }
      .db { fill: #fef3c7; stroke: #f59e0b; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 14; }
      .label { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 16px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#m); }
      .thin { stroke-width: 2.5; }
      .mono { font: 600 15px 'Courier New', monospace; fill: #0f172a; }
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1600" height="1120"/>
  <text class="title" x="60" y="60">Project map: who does what</text>
  <text class="subtitle" x="60" y="95">This app has 3 big parts: frontend (what the user sees), backend (server logic), and MongoDB (where data lives).</text>

  <rect class="group frontend" x="50" y="130" width="690" height="860" rx="24"/>
  <text class="title" x="80" y="180" style="font-size:30px;">Frontend</text>
  <text class="subtitle" x="80" y="210">React + Next.js + TypeScript + Tailwind</text>

  <rect class="box" x="90" y="250" width="260" height="120" rx="16"/>
  <text class="label" x="120" y="292">src/app</text>
  <text class="small" x="120" y="322">Pages and routes</text>
  <text class="mono" x="120" y="350">/page.tsx, /(main)/..., /login</text>

  <rect class="box" x="390" y="250" width="290" height="120" rx="16"/>
  <text class="label" x="420" y="292">src/components</text>
  <text class="small" x="420" y="322">Reusable UI blocks</text>
  <text class="mono" x="420" y="350">Navbar, Footer, QuestionCard</text>

  <rect class="box" x="90" y="420" width="260" height="120" rx="16"/>
  <text class="label" x="120" y="462">src/hooks</text>
  <text class="small" x="120" y="492">Data loading helpers</text>
  <text class="mono" x="120" y="520">useSavedQuestions(), useTicket()</text>

  <rect class="box" x="390" y="420" width="290" height="120" rx="16"/>
  <text class="label" x="420" y="462">src/lib</text>
  <text class="small" x="420" y="492">App brain on frontend</text>
  <text class="mono" x="420" y="520">api.ts, auth.ts, utils.ts</text>

  <rect class="box" x="90" y="590" width="260" height="120" rx="16"/>
  <text class="label" x="120" y="632">src/types</text>
  <text class="small" x="120" y="662">Shapes of data</text>
  <text class="mono" x="120" y="690">Question, Ticket, User, TestResult</text>

  <rect class="box" x="390" y="590" width="290" height="120" rx="16"/>
  <text class="label" x="420" y="632">app/providers.tsx</text>
  <text class="small" x="420" y="662">Global wrappers</text>
  <text class="mono" x="420" y="690">React Query provider</text>

  <rect class="box" x="90" y="770" width="590" height="160" rx="16"/>
  <text class="label" x="120" y="812">Frontend job in one sentence</text>
  <text class="small" x="120" y="845">Show screens, collect clicks, call API, keep small UI state, and paint responses from backend.</text>
  <text class="mono" x="120" y="885">Page -&gt; component -&gt; hook/API -&gt; backend -&gt; response -&gt; UI update</text>

  <line class="arrow" x1="350" y1="310" x2="390" y2="310"/>
  <line class="arrow" x1="220" y1="370" x2="220" y2="420"/>
  <line class="arrow" x1="350" y1="480" x2="390" y2="480"/>
  <line class="arrow" x1="220" y1="540" x2="220" y2="590"/>
  <line class="arrow" x1="535" y1="370" x2="535" y2="420"/>
  <line class="arrow" x1="535" y1="540" x2="535" y2="590"/>
  <line class="arrow thin" x1="535" y1="710" x2="535" y2="770"/>

  <rect class="group backend" x="810" y="130" width="740" height="860" rx="24"/>
  <text class="title" x="840" y="180" style="font-size:30px;">Backend</text>
  <text class="subtitle" x="840" y="210">Node.js + Nitro + TypeScript</text>

  <rect class="box" x="850" y="250" width="280" height="120" rx="16"/>
  <text class="label" x="880" y="292">backend/api</text>
  <text class="small" x="880" y="322">HTTP endpoints</text>
  <text class="mono" x="880" y="350">/auth, /questions, /tickets, /tests</text>

  <rect class="box" x="1170" y="250" width="320" height="120" rx="16"/>
  <text class="label" x="1200" y="292">backend/services</text>
  <text class="small" x="1200" y="322">Business logic</text>
  <text class="mono" x="1200" y="350">auth.service, tests.service, parser.service</text>

  <rect class="box" x="850" y="420" width="280" height="120" rx="16"/>
  <text class="label" x="880" y="462">backend/models</text>
  <text class="small" x="880" y="492">Collection shapes</text>
  <text class="mono" x="880" y="520">user.model, question.model</text>

  <rect class="box" x="1170" y="420" width="320" height="120" rx="16"/>
  <text class="label" x="1200" y="462">backend/middleware</text>
  <text class="small" x="1200" y="492">Gatekeepers</text>
  <text class="mono" x="1200" y="520">auth.ts, requireAdmin.ts</text>

  <rect class="box" x="850" y="590" width="280" height="120" rx="16"/>
  <text class="label" x="880" y="632">backend/utils</text>
  <text class="small" x="880" y="662">Helpers</text>
  <text class="mono" x="880" y="690">connection.ts, jwt.ts, logger.ts</text>

  <rect class="box" x="1170" y="590" width="320" height="120" rx="16"/>
  <text class="label" x="1200" y="632">backend/scripts</text>
  <text class="small" x="1200" y="662">Manual tasks</text>
  <text class="mono" x="1200" y="690">seed, create-admin, backups</text>

  <rect class="box" x="850" y="770" width="640" height="160" rx="16"/>
  <text class="label" x="880" y="812">Backend job in one sentence</text>
  <text class="small" x="880" y="845">Receive a request, validate it, check auth, run service logic, read/write MongoDB, send JSON back.</text>
  <text class="mono" x="880" y="885">API route -&gt; middleware -&gt; service -&gt; model/db -&gt; response</text>

  <line class="arrow" x1="1130" y1="310" x2="1170" y2="310"/>
  <line class="arrow" x1="1330" y1="370" x2="1330" y2="420"/>
  <line class="arrow" x1="990" y1="370" x2="990" y2="420"/>
  <line class="arrow" x1="1330" y1="540" x2="1330" y2="590"/>
  <line class="arrow" x1="990" y1="540" x2="990" y2="590"/>
  <line class="arrow thin" x1="1170" y1="310" x2="1170" y2="770"/>

  <rect class="group db" x="530" y="1000" width="560" height="90" rx="20"/>
  <text class="label" x="570" y="1045">MongoDB collections</text>
  <text class="mono" x="570" y="1072">users, questions, theory_content, test_results, user_saved_question</text>

  <line class="arrow" x1="680" y1="930" x2="720" y2="1000"/>
  <line class="arrow" x1="1170" y1="930" x2="1030" y2="1000"/>
</svg>
